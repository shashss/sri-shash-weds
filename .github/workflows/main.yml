name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Add this global environment variable to fix the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2 # Updated to v2 for 2026 compatibility
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Updated to v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Check if your build outputs to .output/public or dist
          path: './dist/client' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
